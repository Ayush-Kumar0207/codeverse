name: Feature request
description: Propose a focused CodeVerse improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Describe the user need before proposing implementation details.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Explain the workflow, expected behavior, and acceptance criteria.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note simpler approaches or existing features that were evaluated.
