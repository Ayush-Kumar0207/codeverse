name: Bug report
description: Report a reproducible CodeVerse defect.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve CodeVerse. Remove secrets and personal data from logs or screenshots.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Explain the defect and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. Open…\n2. Select…\n3. Observe…"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, operating system, Node.js version, and deployment URL when relevant.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Add sanitized evidence that helps reproduce the problem.
