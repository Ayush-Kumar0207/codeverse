<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deploy Test | CodeVerse Deployment</title>
    
    <style>
      :root {
        color-scheme: dark;
        --bg: #05070d;
        --panel: #0c1220;
        --panel-soft: #111827;
        --line: rgba(148, 163, 184, 0.22);
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #6d6af8;
        --accent-2: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 0%, rgba(109, 106, 248, 0.22), transparent 28rem),
          linear-gradient(135deg, #05070d 0%, #070b13 45%, #02030a 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1080px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 56px 0;
      }

      .shell {
        border: 1px solid var(--line);
        background: rgba(12, 18, 32, 0.84);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.45);
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        padding: 28px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0 0;
        font-size: clamp(32px, 4vw, 56px);
        line-height: 1;
      }

      h2 {
        margin-top: 32px;
        font-size: 22px;
      }

      h3 {
        margin-top: 24px;
        color: #dbeafe;
      }

      p,
      li {
        color: #cbd5e1;
        font-size: 16px;
        line-height: 1.75;
      }

      a {
        color: #a5b4fc;
        text-decoration: none;
      }

      .badge {
        align-self: flex-start;
        border: 1px solid rgba(34, 197, 94, 0.28);
        border-radius: 999px;
        color: var(--accent-2);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.1em;
        padding: 10px 14px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .content {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.7fr);
        gap: 24px;
        padding: 28px;
      }

      .panel {
        border: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.42);
        border-radius: 18px;
        padding: 24px;
      }

      #console-output {
        margin: 0;
        min-height: 180px;
        max-height: 420px;
        overflow: auto;
        white-space: pre-wrap;
        color: #bbf7d0;
        font: 14px/1.65 "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .empty-console {
        color: var(--muted);
      }

      @media (max-width: 820px) {
        header,
        .content {
          grid-template-columns: 1fr;
        }

        header {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <header>
          <div>
            <div class="eyebrow">CodeVerse Deployment</div>
            <h1>Deploy Test</h1>
          </div>
          <div class="badge">Live Preview</div>
        </header>

        <div class="content">
          <article class="panel">
            <h1>Demo</h1>
<ul>
<li>First item</li>
<li>Second item</li>
</ul>
          </article>

          <aside class="panel">
            <h2>Workspace Files</h2>
            <ul>
              <li><a href="./main.js">main.js</a></li>
<li><a href="./README.md">README.md</a></li>
            </ul>
            <h2>Console</h2>
            <pre id="console-output"><span class="empty-console">Run output will appear here when the deployed JavaScript writes to console.log.</span></pre>
          </aside>
        </div>
      </section>
    </main>

    <script>
      (() => {
        const output = document.getElementById("console-output");
        const write = (label, values) => {
          output.textContent = output.textContent.includes("Run output will appear here") ? "" : output.textContent;
          const line = values.map((value) => {
            if (typeof value === "string") return value;
            try {
              return JSON.stringify(value, null, 2);
            } catch {
              return String(value);
            }
          }).join(" ");
          output.textContent += label ? label + " " + line + "\n" : line + "\n";
        };

        const originalLog = console.log.bind(console);
        const originalError = console.error.bind(console);
        console.log = (...values) => {
          originalLog(...values);
          write("", values);
        };
        console.error = (...values) => {
          originalError(...values);
          write("[error]", values);
        };
        window.addEventListener("error", (event) => {
          write("[runtime error]", [event.message]);
        });
      })();
    </script>
    <script src="./main.js" defer></script>
  </body>
</html>
